version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: thesis_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: ./backend # reads backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      # NOTE: use "postgres" (the service name), NOT "localhost"
      DATABASE_URL: postgresql+asyncpg://postgres:password@postgres:5432/thesis_db
      RTSP_URL: rtsp://admin123:raiiraii23@192.168.8.103:554/stream1
      NOISE_THRESHOLD_DB: 99
      TRIGGER_DURATION_MS: 500
      CAPTURE_DIR: ./captures
    volumes:
      - ./backend/captures:/app/captures # persist captured images on your host
    depends_on:
      - postgres # start postgres first
    restart: unless-stopped

volumes:
  pgdata:
